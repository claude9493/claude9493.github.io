<div class="content">
  {% include pagination-newer.html %}

  {{ content }}


<br/>

    <h2 class="post-title">
      <a href="{{ site.baseurl }}{{ post.url }}">
        {{post.title}}
      </a>
    </h2>
    {% include post-meta.html post=post %}

  </article>
  {% endfor %}

  {% include pagination-older.html %}
</div>
